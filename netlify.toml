[build]
  command = "pnpm install --frozen-lockfile && pnpm build"
  # El plugin @netlify/plugin-nextjs maneja automáticamente el directorio publish

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Plugin de Next.js - debe ser el primero
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers para assets estáticos (el plugin ya maneja MIME types básicos)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=86400"
